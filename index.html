<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CiteGuard — see what's proven, sourced, or guessed in any AI answer</title>
<meta name="description" content="Paste any AI answer. CiteGuard lights up what's proven, what's sourced, what's a prediction, and what the AI simply made up. Deterministic, in your browser, nothing uploaded."/>
<style>
 :root{--ink:#06070a;--mut:#8a8f98;--line:#ececf0;--proven:#0a8a2e;--wrong:#d61f1f;--sourced:#0a6cff;--pred:#c07a00;--unv:#9aa0a8;--bg:#fff}
 *{box-sizing:border-box;margin:0;padding:0}
 html,body{height:100%}
 body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Inter,Helvetica,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.45;display:flex;flex-direction:column;min-height:100%}
 .top{padding:26px 28px;font-weight:600;font-size:18px;letter-spacing:-.02em}
 main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 24px}
 .hero{max-width:680px;text-align:center;margin-top:9vh}
 h1{font-size:clamp(34px,6vw,60px);letter-spacing:-.045em;line-height:1.03;font-weight:700}
 .sub{font-size:clamp(16px,2.4vw,21px);color:var(--mut);margin-top:18px;letter-spacing:-.01em}
 .box{width:100%;max-width:680px;margin:34px auto 0}
 textarea{width:100%;min-height:128px;border:1px solid var(--line);border-radius:18px;padding:20px 22px;font-size:17px;font-family:inherit;resize:vertical;outline:none;box-shadow:0 1px 30px rgba(0,0,0,.04);transition:.15s}
 textarea:focus{border-color:#c9ccd2;box-shadow:0 1px 44px rgba(0,0,0,.08)}
 .actions{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:18px}
 button{appearance:none;border:0;background:var(--ink);color:#fff;font-size:16px;font-weight:600;padding:14px 30px;border-radius:980px;cursor:pointer;transition:.15s;font-family:inherit}
 button:hover{transform:translateY(-1px)}
 .samp{color:var(--mut);font-size:14px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
 #out{width:100%;max-width:680px;margin:30px auto 60px}
 .verdict{font-size:15px;font-weight:600;text-align:center;margin-bottom:16px;color:var(--mut)}
 .claim{display:flex;gap:14px;align-items:flex-start;padding:15px 4px;border-top:1px solid var(--line)}
 .dot{flex:none;width:11px;height:11px;border-radius:50%;margin-top:7px}
 .lab{font-size:11px;font-weight:700;letter-spacing:.06em;flex:none;width:92px;padding-top:3px}
 .ctext{font-size:16px}.why{font-size:13px;color:var(--mut);margin-top:3px}
 footer{text-align:center;color:var(--mut);font-size:13px;padding:26px}
 .lp{color:var(--proven)}.lw{color:var(--wrong)}.ls{color:var(--sourced)}.lpr{color:var(--pred)}.lu{color:var(--unv)}
 .dp{background:var(--proven)}.dw{background:var(--wrong)}.ds{background:var(--sourced)}.dpr{background:var(--pred)}.du{background:var(--unv)}
</style></head><body>
<div class="top">⬡ CiteGuard</div>
<main>
 <div class="hero">
  <h1>Is your AI telling the truth?</h1>
  <div class="sub">Paste any AI answer. We light up what's <b style="color:var(--proven)">proven</b>, what's <b style="color:var(--sourced)">sourced</b>, what's a <b style="color:var(--pred)">prediction</b> — and what it simply <b style="color:var(--wrong)">made up</b>.</div>
 </div>
 <div class="box">
  <textarea id="inp" placeholder="Paste an answer from ChatGPT, Claude, Gemini…"></textarea>
  <div class="actions"><button onclick="run()">Check it</button><span class="samp" onclick="sample()">try an example</span></div>
 </div>
 <div id="out"></div>
</main>
<footer>Deterministic · runs in your browser · nothing is uploaded · © 2026 CiteGuard</footer>
<script>
function num(t){var s='';for(const c of t){if((c>='0'&&c<='9')||c==='.'||c==='-')s+=c;}return (s===''||s==='.'||s==='-')?null:(isNaN(+s)?null:+s);}
function isOp(t){return t==='×'||t==='x'||t==='*'||t==='÷'||t==='/'||t==='+'||t==='-';}
function opf(o){return (o==='×'||o==='x'||o==='*')?'*':(o==='÷'||o==='/')?'/':o;}
function unitOf(t){if(!t)return '';var s='';for(const c of t){if((c>='a'&&c<='z')||(c>='A'&&c<='Z'))s+=c;else break;}return (s.length>0&&s.length<=5)?s.toLowerCase():'';}
function evalSeq(n,o){n=n.slice();o=o.slice();for(var i=0;i<o.length;){if(o[i]==='*'||o[i]==='/'){var r=o[i]==='*'?n[i]*n[i+1]:n[i]/n[i+1];n.splice(i,2,r);o.splice(i,1);}else i++;}var a=n[0];for(var j=0;j<o.length;j++)a=o[j]==='+'?a+n[j+1]:a-n[j+1];return a;}
function arithmetic(text){var sp='';for(const c of text)sp+=(c==='=')?' = ':c;var t=sp.split(/\s+/).filter(Boolean);
 for(var i=0;i<t.length;i++){if(t[i]==='='){var r=num(t[i+1]);if(r===null)continue;var ru=unitOf(t[i+2]);var ns=[],os=[],us=[],k=i-1,en=true,pe='';
  while(k>=0){if(en){var u=unitOf(t[k]);if(u&&pe===''){pe=u;k--;continue;}var v=num(t[k]);if(v===null)break;ns.unshift(v);us.unshift(pe);pe='';en=false;k--;}else{if(isOp(t[k])){os.unshift(opf(t[k]));en=true;k--;}else break;}}
  if(ns.length>=2&&os.length===ns.length-1&&!en){var au=us.concat([ru]).filter(x=>x!=='');if([...new Set(au)].length>1)continue;var g=evalSeq(ns,os);return {found:true,ok:Math.abs(g-r)<=Math.max(1e-6,Math.abs(r)*1e-9),got:Math.round(g*100)/100,claimed:r};}}}
 return {found:false};}
function has(L,arr){return arr.some(w=>L.includes(w));}
function classify(s){var L=s.toLowerCase();
 var a=arithmetic(s); if(a.found) return a.ok?['PROVEN','lp','dp','recomputed exactly = '+a.got]:['MADE UP','lw','dw','recomputed '+a.got+' — the text claims '+a.claimed];
 var q=(s.match(/"/g)||[]).length;
 if(has(L,['u.s.c','§',' v. ','et al','according to','per the','(20','(19','reported by','cited in','source:'])||q>=2) return ['SOURCED','ls','ds','traces to a source — verify it says this'];
 if(has(L,['will ','likely','expected','projected','forecast','estimate','predict','should ','may ','could ','probably','%','chance','risk of','approximately'])) return ['PREDICTION','lpr','dpr','an estimate — not an absolute fact'];
 return ['UNVERIFIED','lu','du','asserted with no proof or source — check it'];
}
function split(text){var t=text;['U.S.C.','U.S.','v.','Inc.','No.','et al.','Dr.','Mr.','Mrs.','St.','Fig.'].forEach(a=>{t=t.split(a).join(a.replace(/\./g,'∯'));});
 return t.split(/(?<=[.?!])\s+/).map(x=>x.split('∯').join('.').trim()).filter(x=>x.length>1);}
function run(){var text=document.getElementById('inp').value.trim();var out=document.getElementById('out');if(!text){out.innerHTML='';return;}
 var rows=split(text).map(classify);var made=rows.filter(r=>r[0]==='MADE UP').length;
 var v=made>0?'<span style="color:var(--wrong)">⛔ '+made+' fabricated claim'+(made>1?'s':'')+' found — do not trust as-is</span>':'no fabrications caught — see each claim below';
 var h='<div class="verdict">'+v+'</div>';
 split(text).forEach((s,i)=>{var [lab,lc,dc,why]=rows[i];h+='<div class="claim"><span class="dot '+dc+'"></span><span class="lab '+lc+'">'+lab+'</span><div><div class="ctext">'+s+'</div><div class="why">'+why+'</div></div></div>';});
 out.innerHTML=h;}
function sample(){document.getElementById('inp').value="Your refund is 3 × $400 = $1,200. Under 17 U.S.C. § 107 this qualifies as fair use. There is a 70% chance of rain tomorrow. The new policy will save $50,000 × 1.1 = $60,000 annually. Napoleon was born in 1769.";run();}
</script></body></html>
