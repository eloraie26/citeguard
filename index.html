   var kt=keyTerms(claim),found=[],miss=[];for(var i=0;i<kt.length;i++){(ext.indexOf(kt[i].toLowerCase())>=0?found:miss).push(kt[i]);}
   var link='<a href="'+url+'" target="_blank" style="color:#0071e3;text-decoration:none;font-weight:500">'+title+' ↗</a>';
   var pre='A source for <b>you</b> to judge (not our verdict): ';
   if(kt.length===0)el.innerHTML=pre+link;
   else if(miss.length===0)el.innerHTML=pre+link+' — mentions all your key details ('+found.join(', ')+'). You decide.';
   else if(found.length>0)el.innerHTML=pre+link+' — mentions '+found.join(', ')+' but NOT <b style="color:var(--wrong)">'+miss.join(', ')+'</b>. Check that part.';
   else el.innerHTML=pre+link+' — the topic, but not your specific claim. Read it.';
  });
 }).catch(function(){el.innerHTML='Live source lookup unavailable — verify it yourself.';});}
function checkWiki(){for(var g=0;g<LASTCLAIMS.length;g++){if(LASTROWS[g][0]==='NEEDS A SOURCE'){var el=document.getElementById('g'+g);if(el){el.innerHTML='Checking Wikipedia…';ground(LASTCLAIMS[g],el);}}}}
function council(){var out=document.getElementById('out');
 if(!COUNCIL_URL){if(document.getElementById('cpanel'))return;var p0=document.createElement('div');p0.id='cpanel';p0.className='panel';p0.innerHTML='<b>Council of Models</b> asks several frontier AIs the same question and reports where they <b>agree</b> — the strongest confidence short of proof.<br><br><b>To turn it on:</b> deploy the backend (answer-verifier/council-backend), set one valid model key as a server-side env var, and put its URL in COUNCIL_URL at the top of this script. Until then: <b>CML proves the math</b> and <b>Wikipedia checks the facts</b>.';out.appendChild(p0);return;}
 var q=document.getElementById('inp').value.slice(0,2000);var ex=document.getElementById('cpanel');if(ex)ex.remove();
 var p=document.createElement('div');p.id='cpanel';p.className='panel';p.innerHTML='Asking the council…';out.appendChild(p);
 fetch(COUNCIL_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:'Fact-check this and state what is actually true: '+q})}).then(function(r){return r.json();}).then(function(j){
  var h='<b>Council of Models — '+((j.consensus&&j.consensus.band)||'')+'</b><br><span style="color:var(--mut)">'+((j.consensus&&j.consensus.note)||'')+'</span><br><br>';
  (j.members||[]).forEach(function(m){h+='<div style="margin:6px 0">'+(m.ok?'✅ <b>'+m.model+'</b>: '+m.answer:'❌ <b>'+m.model+'</b> ('+m.error+')')+'</div>';});
  p.innerHTML=h;}).catch(function(e){p.innerHTML='Council backend unreachable — check COUNCIL_URL and that it is deployed.';});}
function run(){var text=document.getElementById('inp').value.replace(/^\s+|\s+$/g,'');var out=document.getElementById('out');if(!text){out.innerHTML='';return;}
 var claims=splitC(text),rows=[];for(var i=0;i<claims.length;i++)rows.push(classify(claims[i]));LASTCLAIMS=claims;LASTROWS=rows;
 function cc(n){var k=0;for(var i=0;i<rows.length;i++)if(rows[i][0]===n)k++;return k;}
 var wrong=cc('WRONG'),correct=cc('CORRECT'),needs=cc('NEEDS A SOURCE');
 var head,hc,hi,cov;
 if(wrong>0){hc='var(--wrong)';hi=ic('WRONG',26);head='Do not trust this as-is';cov='CML proved '+wrong+' statement'+(wrong>1?'s':'')+' factually wrong — the math does not add up.';}
 else if(correct>0&&needs===0){hc='var(--proven)';hi=ic('CORRECT',26);head='CML proved the math correct';cov='I recomputed '+correct+' calculation'+(correct>1?'s':'')+' — all correct.';}
 else if(correct>0){hc='var(--proven)';hi=ic('CORRECT',26);head='Math proven correct — facts are yours to verify';cov='CML proved '+correct+' calculation'+(correct>1?'s':'')+' (all correct). It can’t prove the rest — use a source check below.';}
 else {hc='var(--unv)';hi=ic('NEEDS A SOURCE',26);head='CML can’t prove these — verify with a source';cov='No math to prove here. CML doesn’t assert facts — check them against a source you choose.';}
 var sj=SUBJ>0?' · '+SUBJECTS[SUBJ][0]:'';
 var h='<div class="head" style="color:'+hc+'">'+hi+head+'</div><div class="cov">'+cov+sj+'</div><details open><summary>show each statement ▾</summary>';
 for(var j=0;j<claims.length;j++){var L=rows[j];var wid=L[0]==='NEEDS A SOURCE'?' id="g'+j+'"':'';h+='<div class="claim">'+ic(L[0])+'<span class="lab '+L[1]+'">'+L[0]+'</span><div><div class="ctext">'+claims[j]+'</div><div class="why"'+wid+'>'+L[2]+'</div></div></div>';}
 h+='</details>';
 if(needs>0)h+='<div class="srcbtns"><button class="ghost" onclick="checkWiki()">'+BOOK+'Check against Wikipedia</button><button class="ghost" onclick="council()">'+SCALE+'Council of Models</button></div>';
 out.innerHTML=h;}
function sample(){document.getElementById('inp').value=SUBJECTS[SUBJ][2];run();}
</script></body></html>
